<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🐟 Poisson d'avril</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#001f3f, #0074D9);
    font-family: Arial;
  }

  /* TEXTE FOND */
  .bg-text {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
    color: rgba(255,255,255,0.08);
    font-size: 40px;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    align-content: space-around;
    transform: rotate(-10deg);
  }

  /* GROS TEXTE */
  #title {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 80px;
    font-weight: bold;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.7);
    pointer-events: none;
  }

  /* SIGNATURE */
  #signature {
    position: absolute;
    bottom: 10px;
    right: 15px;
    font-size: 18px;
    color: white;
    opacity: 0.8;
    font-style: italic;
    text-shadow: 0 0 10px black;
    pointer-events: none;
  }

  /* POISSON IMAGE */
  #fish {
    position: absolute;
    width: 220px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  /* animation */
  .wiggle {
    animation: wiggle 0.3s infinite;
  }

  @keyframes wiggle {
    0% { transform: rotate(0deg); }
    25% { transform: rotate(6deg); }
    50% { transform: rotate(-6deg); }
    75% { transform: rotate(6deg); }
    100% { transform: rotate(0deg); }
  }

  /* écailles */
  .scale {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    animation: fall 2s linear forwards;
  }

  @keyframes fall {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(200px) scale(0.2); opacity: 0; }
  }

</style>
</head>

<body>

<div class="bg-text" id="bg"></div>

<div id="title">🐟 POISSON D'AVRIL 🐟</div>
<div id="signature">By Marion</div>

<img id="fish" src="https://i.ibb.co/bRgZqsyZ/Poisson-PNG-Clipart-Poisson-PNG-Poisson-PNG-Animal-PNG-et-vecteur-pour-t-l-chargement-gratuit.jpg">

<script>
/* TEXTE FOND */
const bg = document.getElementById("bg");
for (let i = 0; i < 80; i++) {
  const span = document.createElement("div");
  span.textContent = "🐟 POISSON D'AVRIL 🐟";
  bg.appendChild(span);
}

/* POISSON */
const fish = document.getElementById("fish");

/* position initiale */
fish.style.top = "200px";
fish.style.left = "200px";

/* suit la souris */
document.addEventListener("mousemove", (e) => {
  fish.style.left = (e.clientX - 110) + "px";
  fish.style.top = (e.clientY - 60) + "px";
});

/* clic = wiggle + écailles */
fish.addEventListener("click", () => {
  fish.classList.add("wiggle");

  for (let i = 0; i < 25; i++) {
    const s = document.createElement("div");
    s.classList.add("scale");

    s.style.left = (fish.offsetLeft + 100 + Math.random()*40) + "px";
    s.style.top = (fish.offsetTop + 50 + Math.random()*40) + "px";

    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2000);
  }

  setTimeout(() => {
    fish.classList.remove("wiggle");
  }, 500);
});
</script>

</body>
</html>
